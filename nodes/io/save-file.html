<script type="text/javascript">
    RED.nodes.registerType('rp-save-file', {
        category: 'RP Utils',
        color: '#87CEEB',
        defaults: {
            name: { value: "" },
            mode: { value: "single" },
            inputPath: { value: "payload" },
            inputPathType: { value: "msg" },
            folderPath: {
                value: "",
                validate: function (v) {
                    return this.mode === 'multiple' || (v && v.trim().length > 0);
                }
            },
            folderPathType: { value: "str" },
            filename: { value: "" },
            filenameType: { value: "str" },
            saveConfig: { value: "payload" },
            saveConfigType: { value: "msg" },
            imageField: { value: "bitmap" },
            filenameField: { value: "filename" },
            filenameFieldType: { value: "item" },
            outputDirField: { value: "outputDir" },
            outputDirFieldType: { value: "item" },
            fileType: { value: "auto" },
            imageFormat: { value: "jpg" },
            imageQuality: { value: 90 },
            pngCompression: { value: 8 },
            webpLossless: { value: false },
            webpSmartSubsample: { value: false },
            webpEffort: { value: 4 },
            jsonIndent: { value: 2 },
            overwriteProtection: { value: "true" },
            maxFiles: { value: "" },
            maxFilesType: { value: "num" },
            diskThreshold: { value: 90 },
            outputPath: { value: "savedFile" },
            outputPathType: { value: "msg" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-save",
        label: function () {
            return this.name || "Save File";
        },
        oneditprepare: function () {
            const jsonataTypeOption = {
                value: 'jsonata',
                label: 'JSONata',
                icon: 'red/images/typedInput/expr.svg'
            };

            $("#node-input-inputPath").typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global'],
                typeField: "#node-input-inputPathType"
            });

            $("#node-input-folderPath").typedInput({
                default: 'str',
                types: ['str', 'env', 'msg', 'flow', 'global'],
                typeField: "#node-input-folderPathType"
            });

            const filenameTypes = ['str', 'msg', 'flow', 'global', jsonataTypeOption];

            $("#node-input-filename").typedInput({
                default: 'str',
                types: filenameTypes,
                typeField: "#node-input-filenameType"
            });

            $("#node-input-saveConfig").typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global'],
                typeField: "#node-input-saveConfigType"
            });

            const itemFieldType = {
                value: 'item',
                label: 'Item field',
                icon: 'red/images/typedInput/json.svg'
            };

            $("#node-input-filenameField").typedInput({
                default: 'item',
                types: [itemFieldType, 'str', 'msg', 'flow', 'global'],
                typeField: "#node-input-filenameFieldType"
            });

            $("#node-input-outputDirField").typedInput({
                default: 'item',
                types: [itemFieldType, 'str', 'msg', 'flow', 'global'],
                typeField: "#node-input-outputDirFieldType"
            });

            $("#node-input-outputPath").typedInput({
                default: 'msg',
                types: ['msg', 'flow', 'global'],
                typeField: "#node-input-outputPathType"
            });

            $("#node-input-maxFiles").typedInput({
                default: 'num',
                types: ['num', 'msg', 'flow', 'global'],
                typeField: "#node-input-maxFilesType"
            });

            const fileTypeField = $("#node-input-fileType");
            const imageFormatField = $("#node-input-imageFormat");
            const imageFields = $(".savefile-image-options");
            const jsonFields = $(".savefile-json-options");
            const pngOnlyFields = $(".savefile-png-only");
            const webpOnlyFields = $(".savefile-webp-only");
            const qualityFields = $(".savefile-quality");
            const imageSeparators = $(".savefile-image-separator");
            const jsonSeparators = $(".savefile-json-separator");
            const autoSeparators = $(".savefile-auto-separator");

            function toggleFields() {
                const current = fileTypeField.val();
                imageFields.toggle(current === 'image' || current === 'auto');
                jsonFields.toggle(current === 'json' || current === 'auto');
                toggleImageFormatFields();
                toggleSeparators();
            }

            function toggleImageFormatFields() {
                const fmt = imageFormatField.val();
                const showImage = fileTypeField.val() === 'image' || fileTypeField.val() === 'auto';
                pngOnlyFields.toggle(showImage && fmt === 'png');
                webpOnlyFields.toggle(showImage && fmt === 'webp');
                qualityFields.toggle(showImage && fmt !== 'png' && fmt !== 'bmp');
            }

            function toggleSeparators() {
                const ft = fileTypeField.val();
                const showImageSep = ft === 'image';
                const showJsonSep = ft === 'json';
                const showAutoSep = ft === 'auto';
                imageSeparators.toggle(showImageSep);
                jsonSeparators.toggle(showJsonSep);
                autoSeparators.toggle(showAutoSep);
            }

            fileTypeField.on("change", toggleFields);
            imageFormatField.on("change", toggleImageFormatFields);
            toggleFields();

            // Mode toggle: show/hide single vs multiple fields
            const modeField = $("#node-input-mode");
            function toggleMode() {
                const multi = modeField.val() === 'multiple';
                $(".savefile-single-mode").toggle(!multi);
                $(".savefile-multiple-mode").toggle(multi);
            }
            modeField.on("change", toggleMode);
            toggleMode();
        }
    });
</script>

<script type="text/x-red" data-template-name="rp-save-file">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>

    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-copy"></i> Mode</label>
        <select id="node-input-mode">
            <option value="single">Single file</option>
            <option value="multiple">Multiple files</option>
        </select>
    </div>

    <div class="form-row savefile-single-mode">
        <label for="node-input-inputPath"><i class="fa fa-sign-in"></i> Input</label>
        <input type="text" id="node-input-inputPath" style="width: 70%;">
        <input type="hidden" id="node-input-inputPathType">
    </div>
    <div class="form-tips savefile-single-mode">
        <b>Input:</b> Location of the data to save. Defaults to <code>msg.payload</code>.
    </div>

    <div class="form-row savefile-multiple-mode">
        <label for="node-input-saveConfig"><i class="fa fa-list"></i> Save Config</label>
        <input type="text" id="node-input-saveConfig" style="width: 70%;">
        <input type="hidden" id="node-input-saveConfigType">
    </div>
    <div class="form-tips savefile-multiple-mode">
        Array of objects (or single object). Each object must contain the image field. Filename and output dir can come from each item or be set globally via msg/flow/global.
    </div>
    <div class="form-row savefile-multiple-mode">
        <label for="node-input-imageField"><i class="fa fa-picture-o"></i> Image field</label>
        <input type="text" id="node-input-imageField" placeholder="bitmap">
    </div>
    <div class="form-row savefile-multiple-mode">
        <label for="node-input-filenameField"><i class="fa fa-file-text-o"></i> Filename</label>
        <input type="text" id="node-input-filenameField" style="width: 70%;" placeholder="filename">
        <input type="hidden" id="node-input-filenameFieldType">
    </div>
    <div class="form-row savefile-multiple-mode">
        <label for="node-input-outputDirField"><i class="fa fa-folder-open"></i> Output dir</label>
        <input type="text" id="node-input-outputDirField" style="width: 70%;" placeholder="outputDir">
        <input type="hidden" id="node-input-outputDirFieldType">
    </div>

    <hr>

    <div class="form-row savefile-single-mode">
        <label for="node-input-folderPath"><i class="fa fa-folder-open"></i> Folder</label>
        <input type="text" id="node-input-folderPath" style="width: 70%;" placeholder="/tmp/output">
        <input type="hidden" id="node-input-folderPathType">
    </div>

    <div class="form-row savefile-single-mode">
        <label for="node-input-filename"><i class="fa fa-file-text-o"></i> Filename</label>
        <input type="text" id="node-input-filename" style="width: 70%;" placeholder="optional (auto timestamp)">
        <input type="hidden" id="node-input-filenameType">
    </div>
    <div class="form-tips savefile-single-mode">
        <b>Filename:</b> Leave blank to auto-generate; omit slashes. Extension is added automatically unless you provide one.
    </div>

    <div class="form-row">
        <label for="node-input-fileType"><i class="fa fa-list"></i> File Type</label>
        <select id="node-input-fileType">
            <option value="auto">Auto-detect</option>
            <option value="image">Image</option>
            <option value="json">JSON</option>
            <option value="text">Text</option>
            <option value="binary">Binary</option>
        </select>
    </div>

    <div class="form-row savefile-auto-separator">
        <hr>
    </div>

    <div class="form-row savefile-image-options savefile-separator savefile-image-separator">
        <hr>
    </div>
    <div class="form-row savefile-image-options">
        <label for="node-input-imageFormat"><i class="fa fa-picture-o"></i> Image Format</label>
        <select id="node-input-imageFormat">
            <option value="jpg">JPG</option>
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
            <option value="bmp">BMP</option>
        </select>
    </div>

    <div class="form-row savefile-image-options savefile-quality">
        <label for="node-input-imageQuality"><i class="fa fa-sliders"></i> Quality</label>
        <input type="number" id="node-input-imageQuality" min="1" max="100" step="1" style="width: 30%;" placeholder="90">
    </div>
    <div class="form-row savefile-image-options savefile-png-only">
        <label for="node-input-pngCompression"><i class="fa fa-leaf"></i> Compression</label>
        <input type="number" id="node-input-pngCompression" min="0" max="9" step="1" style="width: 30%;" placeholder="0">
    </div>
    <div class="form-row savefile-image-options savefile-webp-only">
        <label for="node-input-webpLossless"><i class="fa fa-lock"></i> WebP Lossless</label>
        <input type="checkbox" id="node-input-webpLossless" style="display:inline-block; width:auto; vertical-align:baseline;">
        <label for="node-input-webpLossless" style="width:auto; margin-left:5px;">Encode WebP without loss</label>
    </div>
    <div class="form-row savefile-image-options savefile-webp-only">
        <label for="node-input-webpSmartSubsample"><i class="fa fa-magic"></i> WebP Smart Subsample</label>
        <input type="checkbox" id="node-input-webpSmartSubsample" style="display:inline-block; width:auto; vertical-align:baseline;">
        <label for="node-input-webpSmartSubsample" style="width:auto; margin-left:5px;">Improve chroma downsampling (lossy WebP only)</label>
    </div>
    <div class="form-row savefile-image-options savefile-webp-only">
        <label for="node-input-webpEffort"><i class="fa fa-tachometer"></i> WebP Effort</label>
        <input type="number" id="node-input-webpEffort" min="0" max="6" placeholder="4" style="width: 70px;">
        <span style="margin-left: 10px; color: #666;">0-6 (higher = smaller file, slower)</span>
    </div>
    <div class="form-row savefile-image-options savefile-separator savefile-image-separator">
        <hr>
    </div>

    <div class="form-row savefile-json-options savefile-separator savefile-json-separator">
        <hr>
    </div>
    <div class="form-row savefile-json-options">
        <label for="node-input-jsonIndent"><i class="fa fa-indent"></i> JSON Indent</label>
        <input type="number" id="node-input-jsonIndent" min="0" max="8" step="1" style="width: 30%;" placeholder="2">
    </div>
    <div class="form-row savefile-json-options savefile-separator savefile-json-separator">
        <hr>
    </div>

    <div class="form-row savefile-auto-separator">
        <hr>
    </div>

    <div class="form-row">
        <label for="node-input-overwriteProtection"><i class="fa fa-shield"></i> Overwrite</label>
        <select id="node-input-overwriteProtection">
            <option value="true">Avoid overwriting (add suffix)</option>
            <option value="false">Allow overwrite</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-maxFiles"><i class="fa fa-list-ol"></i> Max Files</label>
        <input type="text" id="node-input-maxFiles" style="width: 120px;" placeholder="0">
        <input type="hidden" id="node-input-maxFilesType">
        <span style="margin-left: 10px; color: #666;">0 or blank keeps all files.</span>
    </div>

    <div class="form-row">
        <label for="node-input-diskThreshold"><i class="fa fa-hdd-o"></i> Disk Limit</label>
        <input type="number" id="node-input-diskThreshold" min="0" max="100" step="1" style="width: 70px;">
        <span style="margin-left: 10px; color: #666;">% full — skip saving above this. 0 disables check.</span>
    </div>

    <div class="form-row">
        <label for="node-input-outputPath"><i class="fa fa-sign-out"></i> Result to</label>
        <input type="text" id="node-input-outputPath" style="width: 70%;">
        <input type="hidden" id="node-input-outputPathType">
    </div>
    <div class="form-tips">
        <b>Result:</b> Stores <code>{path, filename, type, extension, sizeBytes[, format]}</code> for downstream nodes. Returns an array of results in multiple mode. Defaults to <code>msg.savedFile</code>.
    </div>
</script>

<script type="text/x-red" data-help-name="rp-save-file">
    <p>Writes incoming data to the local filesystem. Supports raw image objects, encoded image buffers, JSON values, plain text, or arbitrary binary content.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload (default) <span class="property-type">any</span></dt>
        <dd>Data to write. Auto-detection treats raw image objects and encoded image buffers as images; objects/arrays as JSON; strings as text; buffers as binary.</dd>
    </dl>

    <h3>Mode</h3>
    <p>The <b>Mode</b> dropdown controls how the node operates:</p>
    <ul>
        <li><b>Single file</b> — saves one file per message using the Input, Folder, and Filename fields (default behavior).</li>
        <li><b>Multiple files</b> — reads an array of objects from <b>Save Config</b> and saves one file per object. Each object should contain fields for the image/data, filename, and output directory. The field names are configurable via <b>Image field</b>, <b>Filename field</b>, and <b>Output dir field</b>.</li>
    </ul>

    <h4>Multiple mode details</h4>
    <ul>
        <li>A single object (not wrapped in an array) is treated as a one-item batch.</li>
        <li>If an item is missing a required field, the node warns and skips that item — other items still save.</li>
        <li>If all items fail, the node reports an error.</li>
        <li>The result output is always an array of result objects.</li>
        <li>Status shows <code>saved N files</code> or <code>saved N/M files</code> if some were skipped.</li>
    </ul>

    <h3>Properties</h3>
    <dl class="message-properties">
        <dt>Mode <span class="property-type">enum</span></dt>
        <dd>Single file or Multiple files.</dd>
        <dt>Input <span class="property-type">msg | flow | global</span></dt>
        <dd>(Single mode) Location of the data to save. Defaults to <code>msg.payload</code>.</dd>
        <dt>Save Config <span class="property-type">msg | flow | global</span></dt>
        <dd>(Multiple mode) Array of objects, each describing one file to save.</dd>
        <dt>Image field <span class="property-type">string</span></dt>
        <dd>(Multiple mode) Key name for the data/image in each object. Default: <code>bitmap</code>.</dd>
        <dt>Filename <span class="property-type">item | msg | flow | global</span></dt>
        <dd>(Multiple mode) When set to <b>Item field</b>, reads the filename from each object using the specified key (default: <code>filename</code>). When set to msg/flow/global, uses that single value for all items.</dd>
        <dt>Output dir <span class="property-type">item | msg | flow | global</span></dt>
        <dd>(Multiple mode) When set to <b>Item field</b>, reads the output directory from each object using the specified key (default: <code>outputDir</code>). When set to msg/flow/global, uses that single directory for all items.</dd>
        <dt>Folder <span class="property-type">string | env | msg | flow | global</span></dt>
        <dd>(Single mode) Destination directory. Created automatically if missing.</dd>
        <dt>Filename <span class="property-type">string | msg | flow | global</span></dt>
        <dd>(Single mode) Optional name without slashes. When blank, a timestamped name is generated.</dd>
        <dt>File Type <span class="property-type">enum</span></dt>
        <dd>Force saving as image, JSON, text, or binary, or let the node auto-detect from data/extension.</dd>
        <dt>Image Format / Quality / PNG Compression <span class="property-type">enum/number/number</span></dt>
        <dd>Applies when saving images. PNG compression level (0-9): 0 uses a fast raw encoder, 1-9 use Sharp with increasing compression. BMP saves uncompressed with no additional options.</dd>
        <dt>WebP Lossless / Smart Subsample / Effort <span class="property-type">bool/bool/number</span></dt>
        <dd>WebP-specific encoding options. <b>Lossless</b> encodes without quality loss. <b>Smart Subsample</b> improves chroma downsampling for lossy WebP. <b>Effort</b> (0-6) controls the compression effort trade-off; higher values produce smaller files but encode more slowly.</dd>
        <dt>JSON Indent <span class="property-type">number</span></dt>
        <dd>Spacing for pretty-printed JSON output.</dd>
        <dt>Overwrite <span class="property-type">enum</span></dt>
        <dd>By default the node avoids overwriting existing files, appending a numeric suffix when needed.</dd>
        <dt>Max Files <span class="property-type">num | msg | flow | global</span></dt>
        <dd>Maximum number of files to keep in the folder. After saving, the oldest files (by modification time) are removed so the total does not exceed this limit. Set to 0 or leave blank to keep all files.</dd>
        <dt>Disk Limit <span class="property-type">number</span></dt>
        <dd>Percentage of disk usage above which saving is skipped to avoid exhausting disk space. Default is 90%. Set to 0 to disable the check.</dd>
        <dt>Result to <span class="property-type">msg | flow | global</span></dt>
        <dd>Where to store a summary of the saved file: <code>{ path, filename, type, extension, sizeBytes, format? }</code>.</dd>
    </dl>

    <h3>Behavior</h3>
    <ul>
        <li>Auto-detect looks at configured extension, raw image structure, or Sharp metadata for buffers.</li>
        <li>Image inputs accept encoded buffers or raw objects {data, width, height, channels, colorSpace}.</li>
        <li>JSON inputs are pretty-printed; JSON strings are preserved if already valid.</li>
        <li>When overwrite protection is enabled, a numeric suffix is appended if the target file exists.</li>
        <li>In multiple mode, saves are processed sequentially to ensure correct overwrite protection and max-files enforcement.</li>
    </ul>
</script>
